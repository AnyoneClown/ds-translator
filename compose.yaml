services:
  translator-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discord-translator-bot
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
        reservations:
          memory: 128M